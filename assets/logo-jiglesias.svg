      <stop offset="0" stop-color="#ff2f2f"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#6fc3ff"/>
    </linearGradient>
    <linearGradient id="word" x1="220" y1="52" x2="524" y2="52" gradientUnits="userSpaceOnUse">
