<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-labelledby="title desc">
  <title id="title">J. Iglesias</title>
  <desc id="desc">Logotipo minimalista J. Iglesias com monograma automóvel próprio</desc>
  <defs>
    <linearGradient id="markLine" x1="95" y1="18" x2="95" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".54" stop-color="#f3f7ff"/>
      <stop offset="1" stop-color="#aeb7c4"/>
    </linearGradient>
    <linearGradient id="accent" x1="20" y1="120" x2="490" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2f2f"/>
      <stop offset=".52" stop-color="#ff2f2f"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".15"/>
    </linearGradient>
    <filter id="cleanGlow" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#ff2f2f" flood-opacity=".38"/>
    </filter>
  </defs>

  <g filter="url(#cleanGlow)">
    <path d="M96 19 49 49h34v59c0 15-7 25-22 31h38c22-9 33-26 33-51V49h33Z" fill="url(#markLine)"/>
    <path d="M151 38h34v101h-34Z" fill="#ffffff"/>
    <path d="M49 49 96 19l69 30" fill="none" stroke="#ff2f2f" stroke-width="5" stroke-linejoin="round"/>
    <path d="M46 121h144" stroke="#ff2f2f" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g>
    <text x="230" y="72" font-family="Inter, Arial, sans-serif" font-size="43" font-weight="800" fill="#ffffff" letter-spacing="7">JIGLESIAS</text>
    <text x="233" y="104" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#aeb7c4" letter-spacing="5">CENTRO AUTOMOVEL</text>
    <path d="M232 120h235" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <path d="M477 120h18" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".72"/>
  </g>
</svg>
