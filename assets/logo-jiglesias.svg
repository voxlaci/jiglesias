    <text x="230" y="105" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#aeb7c4" letter-spacing="5.8">AUTOMOTIVE EXPERIENCE</text>
    <path d="M230 120h226" stroke="#ff2f2f" stroke-width="3" stroke-linecap="round"/>
