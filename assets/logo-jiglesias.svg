<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 170" role="img" aria-labelledby="title desc">
  <title id="title">J. Iglesias</title>
  <desc id="desc">Logotipo J. Iglesias inspirado num painel de velocidades cinematografico</desc>
  <defs>
    <linearGradient id="steel" x1="55" y1="28" x2="610" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".42" stop-color="#eef3f8"/>
      <stop offset=".72" stop-color="#aab5c2"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="redline" x1="44" y1="122" x2="228" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2323" stop-opacity="0"/>
      <stop offset=".45" stop-color="#ff2323"/>
      <stop offset="1" stop-color="#ff8a00"/>
    </linearGradient>
    <linearGradient id="roadGlow" x1="244" y1="103" x2="635" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2525" stop-opacity=".95"/>
      <stop offset=".44" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset=".76" stop-color="#ff2525" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ff2525" stop-opacity="0"/>
    </linearGradient>
    <filter id="nightGlow" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity=".22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ff2525" flood-opacity=".24"/>
    </filter>
  </defs>

  <g filter="url(#nightGlow)">
    <path d="M45 118a89 89 0 0 1 178-1" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".9"/>
    <path d="M45 118a89 89 0 0 1 178-1" fill="none" stroke="url(#redline)" stroke-width="12" stroke-linecap="round" stroke-dasharray="72 210" stroke-dashoffset="-164"/>
    <path d="M72 113 61 120M81 83 66 76M107 61l-7-17M140 55V36M173 64l9-16M199 86l16-10M211 116l18-1" stroke="#dce4ed" stroke-width="4" stroke-linecap="round"/>
    <path d="M133 113 195 68" stroke="#ff2525" stroke-width="8" stroke-linecap="round"/>
    <circle cx="133" cy="113" r="11" fill="#0b0f15" stroke="#ffffff" stroke-width="5"/>
    <path d="M50 129h151" stroke="#ff2525" stroke-width="5" stroke-linecap="round" opacity=".9"/>
    <text x="94" y="102" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#ffffff" letter-spacing="-1">JI</text>
  </g>

  <g transform="skewX(-9)">
    <text x="250" y="82" font-family="Inter, Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="url(#steel)" letter-spacing="5">JIGLESIAS</text>
    <path d="M248 101h250l75-22h42l-77 34H252z" fill="#05070a" stroke="url(#roadGlow)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M260 107h266" stroke="#ff2525" stroke-width="5" stroke-linecap="round" opacity=".95"/>
    <path d="M315 101h32M388 101h42M474 101h56M566 97h32" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".86"/>
    <path d="M250 94h210M496 91h41" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity=".34"/>
  </g>

  <path d="M594 78h48l-20 16h-48z" fill="#ff2525" opacity=".92"/>
  <path d="M629 78h27l-20 16h-27z" fill="#ffffff" opacity=".72"/>
</svg>
