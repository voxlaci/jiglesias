<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 150" role="img" aria-labelledby="title desc">
  <title id="title">J. Iglesias</title>
  <desc id="desc">Logotipo J. Iglesias com monograma J e silhueta automovel premium</desc>
  <defs>
    <linearGradient id="metal" x1="72" y1="20" x2="560" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#dfe5ec"/>
      <stop offset="1" stop-color="#8c98a6"/>
    </linearGradient>
    <linearGradient id="flare" x1="34" y1="104" x2="193" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3030" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ff3030"/>
      <stop offset="1" stop-color="#ff3030" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-45%" width="130%" height="190%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#ffffff" flood-opacity=".2"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff3030" flood-opacity=".18"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M40 101h153" stroke="url(#flare)" stroke-width="5" stroke-linecap="round"/>
    <path d="M55 78c21-22 45-33 72-33h28c17 0 31 7 43 21l22 25" fill="none" stroke="url(#metal)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M74 91h118" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity=".72"/>
    <circle cx="88" cy="96" r="9" fill="none" stroke="#dfe5ec" stroke-width="4"/>
    <circle cx="174" cy="96" r="9" fill="none" stroke="#dfe5ec" stroke-width="4"/>
    <path d="M126 33v55c0 21-15 34-38 34-16 0-28-5-37-15" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M126 33h34" stroke="#ff3030" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g>
    <text x="242" y="77" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="760" fill="url(#metal)" letter-spacing="7">JIGLESIAS</text>
    <text x="246" y="106" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" fill="#b6c0cc" letter-spacing="5.4">CENTRO AUTOMOVEL</text>
    <path d="M246 121h185" stroke="#ff3030" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M446 121h58" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity=".62"/>
